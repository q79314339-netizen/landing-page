<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Products Landing Page</title>

<!-- Facebook Pixel -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

fbq('init', '853640044397925');
fbq('track', 'PageView');
</script>

<style>
body{font-family:Arial;margin:0;background:#f9f9f9;color:#111}
.container{max-width:1000px;margin:40px auto;background:#fff;padding:30px;border-radius:12px}
h1,h2{text-align:center;color:#d4af37}
p{text-align:center;color:#333}

.product-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px
}

.product-item img{
width:100%;
height:300px;
object-fit:cover;
border-radius:12px;
cursor:pointer
}

.wa-button-wrap{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px
}

.wa-button-wrap button{
background:#25D366;
border:none;
padding:12px 25px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer
}

#waBadge{
background:#d4af37;
padding:4px 10px;
border-radius:12px;
font-size:13px;
font-weight:bold
}

#floatWA{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer
}

#floatWA img{
width:35px
}

@media(max-width:768px){
.product-grid{grid-template-columns:1fr}
.product-item img{height:250px}
}
</style>
</head>

<body>

<div class="container">

<h1>Masterfully Crafted Luxury</h1>
<p>Explore our finest collection of watches, bags, and shoes.</p>

<div class="wa-button-wrap">
<button id="waBtn">Contact via WhatsApp</button>
<span id="waBadge"></span>
</div>

<h2>Popular Products</h2>

<div class="product-grid">

<div class="product-item">
<img id="product1" src="https://picsum.photos/400/300?1">
<p>Sneakers Collection</p>
</div>

<div class="product-item">
<img id="product2" src="https://picsum.photos/400/300?2">
<p>LV Bags Collection</p>
</div>

<div class="product-item">
<img id="product3" src="https://picsum.photos/400/300?3">
<p>Designer Sneakers</p>
</div>

</div>

</div>

<div id="floatWA">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</div>

<script>

/* 客服池 */
const WA_POOL = [
{name:"Alice",link:"https://wa.me/8618396503253"},
{name:"Bob",link:"https://wa.me/8613062151120"},
{name:"Charlie",link:"https://wa.me/8615205956592"},
{name:"Diana",link:"https://wa.me/8618050517014"}
];

/* 随机分配客服 + 固定 */
let currentWaIndex = localStorage.getItem('wa_assigned_index');

if(currentWaIndex === null){

currentWaIndex = Math.floor(Math.random() * WA_POOL.length);

localStorage.setItem('wa_assigned_index',currentWaIndex);

}

currentWaIndex = parseInt(currentWaIndex);

/* 显示客服名字 */
document.getElementById('waBadge').innerText = WA_POOL[currentWaIndex].name;


/* 跳转WA */
function goWA(eventName,params={}){

fbq('track',eventName,{
...params,
assigned_customer_service:WA_POOL[currentWaIndex].name
});

window.location.href = WA_POOL[currentWaIndex].link;

}


/* 按钮事件 */

document.getElementById('waBtn').onclick=function(){

goWA('Lead',{content_name:'MainWA'});

}

document.getElementById('floatWA').onclick=function(){

goWA('Contact',{content_name:'FloatWA'});

}

document.getElementById('product1').onclick=function(){

goWA('ViewContent',{content_name:'Sneakers'});

}

document.getElementById('product2').onclick=function(){

goWA('ViewContent',{content_name:'Bags'});

}

document.getElementById('product3').onclick=function(){

goWA('ViewContent',{content_name:'DesignerSneakers'});

}

</script>

</body>
</html>
