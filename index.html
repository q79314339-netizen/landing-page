<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury Products Landing Page</title>

<!-- Facebook Pixel -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}
(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

fbq('init','853640044397925');
fbq('track','PageView');
</script>

<style>

body{
font-family:Arial;
background:#f9f9f9;
margin:0;
padding:0;
color:#111;
}

.container{
max-width:1000px;
margin:40px auto;
background:#fff;
padding:30px;
border-radius:12px;
}

h1,h2{
text-align:center;
color:#d4af37;
}

.product-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.product-item img{
width:100%;
height:280px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
}

.wa-btn{
background:#25D366;
color:#fff;
padding:12px 25px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

#waBadge{
background:#d4af37;
padding:4px 10px;
border-radius:10px;
margin-left:10px;
}

#floatWA{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

#floatWA img{
width:35px;
}

#liveNotice{
position:fixed;
left:20px;
bottom:20px;
background:#111;
color:#fff;
padding:10px 15px;
border-radius:8px;
font-size:14px;
opacity:0.9;
}

@media(max-width:768px){

.product-grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Masterfully Crafted Luxury</h1>

<p style="text-align:center">
Explore our finest watches, bags, and sneakers.
Trusted by customers worldwide.
</p>

<div style="text-align:center;margin-top:20px">

<button id="waBtn" class="wa-btn">
Contact via WhatsApp
</button>

<span id="waBadge"></span>

</div>

<div class="product-grid">

<div class="product-item">
<img id="product1" src="https://picsum.photos/500/400?1">
<p>Sneakers Collection</p>
</div>

<div class="product-item">
<img id="product2" src="https://picsum.photos/500/400?2">
<p>LV Bags Collection</p>
</div>

<div class="product-item">
<img id="product3" src="https://picsum.photos/500/400?3">
<p>Designer Sneakers</p>
</div>

</div>

</div>

<div id="floatWA">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</div>

<div id="liveNotice"></div>

<script>

//////////////////////////////////////////////////
//// WhatsApp 客服池
//////////////////////////////////////////////////

const WA_POOL=[

{
name:"Alice",
link:"https://wa.me/8618396503253?text=Hello%20I%20am%20interested%20in%20your%20products"
},

{
name:"Bob",
link:"https://wa.me/8613062151120?text=Hello%20I%20am%20interested%20in%20your%20products"
},

{
name:"Charlie",
link:"https://wa.me/8615205956592?text=Hello%20I%20am%20interested%20in%20your%20products"
},

{
name:"Diana",
link:"https://wa.me/8618050517014?text=Hello%20I%20am%20interested%20in%20your%20products"
}

];

let waIndex=Math.floor(Math.random()*WA_POOL.length);

document.getElementById("waBadge").innerText=WA_POOL[waIndex].name;

//////////////////////////////////////////////////
//// 广告UTM追踪
//////////////////////////////////////////////////

function getUTM(){

const params=new URLSearchParams(window.location.search);

return{
source:params.get("utm_source"),
campaign:params.get("utm_campaign"),
adset:params.get("utm_adset"),
ad:params.get("utm_ad")
}

}

const utm=getUTM();

fbq('trackCustom','AdTraffic',utm);

//////////////////////////////////////////////////
//// WhatsApp 跳转
//////////////////////////////////////////////////

function goWA(eventName,params={}){

waIndex=Math.floor(Math.random()*WA_POOL.length);

fbq('track',eventName,params);

fbq('track','InitiateCheckout');

window.location.href=WA_POOL[waIndex].link;

}

//////////////////////////////////////////////////
//// 按钮事件
//////////////////////////////////////////////////

document.getElementById("waBtn").onclick=function(){

goWA('Lead',{
content_name:"Main_WhatsApp_Button"
})

}

document.getElementById("floatWA").onclick=function(){

goWA('Contact',{
content_name:"Float_WhatsApp_Button"
})

}

//////////////////////////////////////////////////
//// 产品点击
//////////////////////////////////////////////////

document.getElementById("product1").onclick=function(){

goWA('ViewContent',{
content_name:"Sneakers"
})

}

document.getElementById("product2").onclick=function(){

goWA('ViewContent',{
content_name:"LV_Bags"
})

}

document.getElementById("product3").onclick=function(){

goWA('ViewContent',{
content_name:"Designer_Sneakers"
})

}

//////////////////////////////////////////////////
//// 停留时间追踪
//////////////////////////////////////////////////

let startTime=Date.now();

window.addEventListener("beforeunload",function(){

let duration=Math.floor((Date.now()-startTime)/1000);

if(duration>20){

fbq('trackCustom','EngagedVisitor',{
time_on_page:duration
})

}

});

//////////////////////////////////////////////////
//// 实时访客提示
//////////////////////////////////////////////////

const names=["David","Emma","Lucas","Sophia","Daniel","Olivia"];
const cities=["New York","London","Sydney","Toronto","Singapore"];

function showNotice(){

const name=names[Math.floor(Math.random()*names.length)];
const city=cities[Math.floor(Math.random()*cities.length)];

document.getElementById("liveNotice").innerText=
name+" from "+city+" just contacted us";

setTimeout(()=>{
document.getElementById("liveNotice").innerText="";
},4000);

}

setInterval(showNotice,8000);

</script>

</body>
</html>
