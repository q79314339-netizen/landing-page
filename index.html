<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Bags & Watches</title>

<style>
body{font-family:Arial;margin:0;background:#fff;color:#111;}
.hero{height:420px;background:url("https://us.louisvuitton.com/images/is/image/lv/1/PP_VP_L/louis-vuitton-again--M25877_PM2_Front%20view.jpg") center/cover no-repeat;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;text-align:center;}
.hero h1{font-size:48px;}
.hero p{font-size:18px;}
button{cursor:pointer}

.lang-box{
position:fixed;top:10px;right:10px;z-index:999;
}
.lang-box button{
margin-left:5px;padding:6px 10px;border:none;background:#FFD700;border-radius:6px;
}

.container{padding:20px;max-width:1100px;margin:auto;}
h2{color:#FFD700}

.product{margin:20px 0;}
</style>
</head>

<body>

<!-- 语言切换 -->
<div class="lang-box">
<button onclick="applyLanguage('en')">EN</button>
<button onclick="applyLanguage('it')">IT</button>
<button onclick="applyLanguage('fr')">FR</button>
</div>

<!-- Hero -->
<div class="hero">
<h1 id="title">Luxury Bags & Watches</h1>
<p id="desc">Premium Quality | Direct Factory Supply | Worldwide Shipping</p>
<button id="waBtn">Contact via WhatsApp</button>
</div>

<div class="container">

<h2 id="products">👜 Popular Products</h2>
<div class="product">Neverfull MM</div>
<div class="product">Messenger Bag</div>
<div class="product">Tambour Watch</div>

<h2 id="shipping">🚚 Shipping</h2>
<p id="shipText">Orders processed within 24 hours</p>

<h2 id="payment">💰 Payment</h2>
<p id="payText">PayPal / Bank Transfer</p>

</div>

<script>
// ===== 多语言 =====
const LANG = {
  en: {
    title:"Luxury Bags & Watches",
    desc:"Premium Quality | Direct Factory Supply | Worldwide Shipping",
    btn:"Contact via WhatsApp",
    products:"👜 Popular Products",
    shipping:"🚚 Shipping",
    payment:"💰 Payment",
    shipText:"Orders processed within 24 hours",
    payText:"PayPal / Bank Transfer"
  },
  it: {
    title:"Borse e Orologi di Lusso",
    desc:"Qualità Premium | Fabbrica Diretta | Spedizione Globale",
    btn:"Contatta su WhatsApp",
    products:"👜 Prodotti Popolari",
    shipping:"🚚 Spedizione",
    payment:"💰 Pagamento",
    shipText:"Ordini elaborati entro 24 ore",
    payText:"PayPal / Bonifico Bancario"
  },
  fr: {
    title:"Sacs et Montres de Luxe",
    desc:"Qualité Premium | Usine Directe | Livraison Mondiale",
    btn:"Contacter sur WhatsApp",
    products:"👜 Produits Populaires",
    shipping:"🚚 Livraison",
    payment:"💰 Paiement",
    shipText:"Commandes traitées sous 24 heures",
    payText:"PayPal / Virement bancaire"
  }
};

// ===== 应用语言 =====
function applyLanguage(lang){
  const t = LANG[lang];

  document.getElementById("title").innerText = t.title;
  document.getElementById("desc").innerText = t.desc;
  document.getElementById("waBtn").innerText = t.btn;
  document.getElementById("products").innerText = t.products;
  document.getElementById("shipping").innerText = t.shipping;
  document.getElementById("payment").innerText = t.payment;
  document.getElementById("shipText").innerText = t.shipText;
  document.getElementById("payText").innerText = t.payText;

  localStorage.setItem("lang", lang);
}

// ===== 检测语言（关键优化版）=====
async function detectLanguage(){

  // ✅ 1. 先看浏览器语言（最稳）
  const browserLang = navigator.language.toLowerCase();

  if(browserLang.includes("it")) return applyLanguage("it");
  if(browserLang.includes("fr")) return applyLanguage("fr");

  // ✅ 2. 再用IP兜底
  try{
    const res = await fetch("https://ipinfo.io/json?token=YOUR_TOKEN");
    const data = await res.json();

    if(data.country === "IT") return applyLanguage("it");
    if(data.country === "FR") return applyLanguage("fr");

    applyLanguage("en");

  }catch{
    applyLanguage("en");
  }
}

// ===== 启动 =====
const saved = localStorage.getItem("lang");

if(saved){
  applyLanguage(saved);
}else{
  detectLanguage();
}
</script>

</body>
</html>
